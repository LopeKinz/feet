<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local Coop Host</title>
    <style>
      body { margin: 0; font-family: system-ui, sans-serif; background: #111; color: #eee; }
      #hud { padding: 10px 14px; background: #1b1b1b; display: flex; gap: 16px; align-items: center; }
      canvas { display: block; width: 100vw; height: calc(100vh - 48px); background: linear-gradient(#1f355e, #76a7ef); }
      code { background: #2a2a2a; padding: 2px 6px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <div id="hud">
      <strong>Host läuft</strong>
      <span>Controller URL: <code id="controllerUrl"></code></span>
      <span>Spieler: <span id="playerCount">0</span></span>
    </div>
    <canvas id="game" width="1280" height="720"></canvas>
    <script src="/static/host.js"></script>
  </body>
</html>
